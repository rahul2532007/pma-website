<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background matching the top bar (glass-pill over surface) -->
  <rect width="512" height="512" fill="#F2EFEA" />
  <rect width="512" height="512" fill="rgba(255, 255, 255, 0.4)" />
  
  <!-- "Pride" Text -->
  <text 
    x="50%" 
    y="50%" 
    font-family="'Playfair Display', serif" 
    font-size="160" 
    font-weight="bold" 
    font-style="italic" 
    fill="#5E6B55" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-0.02em"
  >
    Pride
  </text>
</svg>
